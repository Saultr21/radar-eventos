const TYPE_LABELS = {
  evento: 'Evento', formacion: 'Formación', networking: 'Networking',
  jornada: 'Jornada', feria: 'Feria', mision: 'Misión', otro: 'Otro'
};

let currentView = 'cards';
let sortCol = 'date';
let sortDir = 1;

function parseDate(s) {
  const p = (s || '').split('-')[0].trim();
  const [d, m, y] = p.split('/');
  if (!d || !m || !y) return new Date(2099, 11, 31);
  return new Date(+y, +m - 1, +d);
}

function populateFilters() {
  const types  = [...new Set(EVENTS.map(e => e.type))].sort();
  const cats   = [...new Set(EVENTS.map(e => e.category))].sort();
  const assocs = [...new Set(EVENTS.map(e => e.association))].sort();
  const fill = (id, vals) => {
    const sel = document.getElementById(id);
    vals.forEach(v => {
      const o = document.createElement('option');
      o.value = v;
      o.textContent = TYPE_LABELS[v] || v;
      sel.appendChild(o);
    });
  };
  fill('f-type', types);
  fill('f-cat', cats);
  fill('f-assoc', assocs);
}

function getFiltered() {
  const q      = document.getElementById('q').value.toLowerCase();
  const ftype  = document.getElementById('f-type').value;
  const fcat   = document.getElementById('f-cat').value;
  const fassoc = document.getElementById('f-assoc').value;
  const fsort  = document.getElementById('f-sort').value || sortCol;

  let evs = EVENTS.filter(e => {
    if (ftype  && e.type        !== ftype)  return false;
    if (fcat   && e.category    !== fcat)   return false;
    if (fassoc && e.association !== fassoc) return false;
    if (q && !`${e.title} ${e.description} ${e.association}`.toLowerCase().includes(q)) return false;
    return true;
  });

  evs.sort((a, b) => {
    let va = a[fsort] || '', vb = b[fsort] || '';
    if (fsort === 'date') {
      va = parseDate(va); vb = parseDate(vb);
      return sortDir * (va - vb);
    }
    return sortDir * va.localeCompare(vb, 'es');
  });
  return evs;
}

function badgeClass(type) { return 'badge b-' + (type || 'otro'); }

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderCards(evs) {
  const g = document.getElementById('grid');
  if (!evs.length) {
    g.innerHTML = '<div class="empty">Sin eventos para los filtros seleccionados.</div>';
    return;
  }
  g.innerHTML = evs.map(e => `
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          ${e.url ? `<a href="${e.url}" target="_blank" rel="noopener">${esc(e.title)}</a>` : esc(e.title)}
        </div>
        <span class="${badgeClass(e.type)}">${TYPE_LABELS[e.type] || e.type}</span>
      </div>
      <div class="card-assoc">${esc(e.association)} &middot; ${esc(e.category)}</div>
      ${e.description ? `<div class="card-desc">${esc(e.description)}</div>` : ''}
      <div class="card-footer">
        <span class="chip chip-date">📅 ${e.date}</span>
        ${e.time ? `<span class="chip chip-date">🕐 ${e.time}</span>` : ''}
        ${e.location !== '—' ? `<span class="chip chip-loc">📍 ${esc(e.location)}</span>` : ''}
        ${e.price    !== '—' ? `<span class="chip chip-price">💶 ${esc(e.price)}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function renderTable(evs) {
  const tb = document.getElementById('tbody');
  if (!evs.length) {
    tb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#94a3b8">Sin resultados</td></tr>';
    return;
  }
  tb.innerHTML = evs.map(e => `
    <tr>
      <td class="td-date">${e.date}${e.time ? ' · ' + e.time : ''}</td>
      <td class="td-title">
        ${e.url ? `<a href="${e.url}" target="_blank" rel="noopener">${esc(e.title)}</a>` : esc(e.title)}
        ${e.description
          ? `<div style="font-size:11px;color:#94a3b8;margin-top:2px">${esc(e.description.substring(0, 100))}${e.description.length > 100 ? '…' : ''}</div>`
          : ''}
      </td>
      <td><span class="${badgeClass(e.type)}">${TYPE_LABELS[e.type] || e.type}</span></td>
      <td class="td-assoc">${esc(e.association)}</td>
      <td class="td-loc" title="${esc(e.location)}">${esc(e.location)}</td>
      <td class="td-price">${e.price !== '—' ? esc(e.price) : '<span style="color:#cbd5e1">—</span>'}</td>
    </tr>
  `).join('');
}

function render() {
  const evs = getFiltered();
  document.getElementById('counter').textContent = `${evs.length} evento${evs.length !== 1 ? 's' : ''}`;
  if (currentView === 'cards') renderCards(evs); else renderTable(evs);
}

function setView(v) {
  currentView = v;
  document.getElementById('grid').style.display       = v === 'cards' ? '' : 'none';
  document.getElementById('table-wrap').style.display = v === 'table' ? '' : 'none';
  document.getElementById('btn-cards').classList.toggle('active', v === 'cards');
  document.getElementById('btn-table').classList.toggle('active', v === 'table');
  render();
}

function setSortCol(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  document.getElementById('f-sort').value = col;
  render();
}

function renderStats() {
  const types  = {};
  EVENTS.forEach(e => { types[e.type] = (types[e.type] || 0) + 1; });
  const assocs = new Set(EVENTS.map(e => e.association)).size;
  document.getElementById('hdr-stats').innerHTML = `
    <div class="stat"><div class="n">${EVENTS.length}</div><div class="l">Eventos</div></div>
    <div class="stat"><div class="n">${assocs}</div><div class="l">Fuentes</div></div>
    ${Object.entries(types).sort((a, b) => b[1] - a[1]).slice(0, 2).map(([t, n]) => `
    <div class="stat"><div class="n">${n}</div><div class="l">${TYPE_LABELS[t] || t}</div></div>`).join('')}
  `;
}

['q', 'f-type', 'f-cat', 'f-assoc', 'f-sort'].forEach(id =>
  document.getElementById(id).addEventListener('input', render)
);

populateFilters();
renderStats();
render();
</script>
</body>
</html>
